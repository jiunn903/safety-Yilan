<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 分析</title>
    <!-- Core Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-slate-400 font-bold text-lg">系統版本 v4.1 載入中...</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className = "" }) => {
            const icons = {
                ShieldAlert: "🛡️", Sparkles: "✨", Activity: "📈", AlertCircle: "⚠️",
                RefreshCw: "🔄", Loader2: "⏳", Target: "🎯", Zap: "⚡",
                Cpu: "⚙️", ShieldCheck: "✅", Lightbulb: "💡", CheckCircle2: "✔️",
                UserX: "👤", AlertTriangle: "🚧", Info: "ℹ️", Search: "🔍", Key: "🔑"
            };
            return <span className={`inline-block leading-none ${className}`} style={{ fontSize: '1.2em' }}>{icons[name] || "•"}</span>;
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [systemStatus, setSystemStatus] = useState("Ready");
            const [formData, setFormData] = useState({
                description: '',
                analysis: null
            });

            // 🔑 API Key Position - Please replace with your actual key
            const rawApiKey = "AIzaSyCcYCcxniELJ5IKv5SxiMJM8SfNzhg4LAI"; 
            const apiKey = rawApiKey.trim();

            const findBestModel = async () => {
                setSystemStatus("正在校準 AI 引擎權限...");
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await response.json();
                    
                    if (data.error) {
                        if (data.error.status === "PERMISSION_DENIED") {
                            throw new Error("API 金鑰權限被拒。原因：該金鑰可能未啟用 Generative Language API 服務。");
                        }
                        throw new Error(data.error.message);
                    }

                    if (data.models && data.models.length > 0) {
                        const best = data.models.find(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent')) ||
                                     data.models.find(m => m.name.includes('pro') && m.supportedGenerationMethods.includes('generateContent')) ||
                                     data.models[0];
                        
                        return { 
                            path: best.name, 
                            version: 'v1beta' 
                        };
                    }
                    throw new Error("此 API Key 下找不到任何可用的 AI 模型。");
                } catch (err) {
                    throw new Error(err.message);
                }
            };

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);
                setSystemStatus("啟動備援診斷...");

                if (!apiKey || apiKey === "在此貼上你的金鑰") {
                    setError("尚未偵測到有效的 API Key。");
                    setLoading(false);
                    return;
                }

                const fullPrompt = `你是一位資深工安專家。分析以下事故內容並提供專業「三因分析」。
                要求：
                1. 「間接原因」必須細分為「不安全的狀況」與「不安全的行為」。
                2. 回覆繁體中文 JSON。
                格式範例：{"directCauses":["內容"],"unsafeConditions":["內容"],"unsafeActs":["內容"],"basicCauses":["內容"],"countermeasures":["內容"],"riskLevel":"高"}
                事故內容：${formData.description}`;

                try {
                    const modelInfo = await findBestModel();
                    setSystemStatus(`使用路徑: ${modelInfo.path}`);

                    const response = await fetch(`https://generativelanguage.googleapis.com/${modelInfo.version}/${modelInfo.path}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: fullPrompt }] }]
                        })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error?.message || "請求失敗");
                    }
                    
                    let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("AI 無回應內容");

                    text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    const data = JSON.parse(text);
                    setFormData(prev => ({ ...prev, analysis: data }));
                    setSystemStatus("分析成功");
                } catch (err) {
                    setError(err.message);
                    setSystemStatus("Error");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row text-sm">
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg shadow-lg flex items-center justify-center">
                                <Icon name="ShieldAlert" className="text-white" />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">工安助手</h1>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100">
                                <Icon name="Sparkles" /> 權限自癒系統
                            </div>
                            <div className="px-4 py-2 border border-slate-100 rounded-lg">
                                <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">系統狀態</p>
                                <p className="text-[11px] font-bold text-slate-600 flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${systemStatus.includes('Error') ? 'bg-red-500' : systemStatus.includes('Ready') ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse'}`}></span>
                                    {systemStatus}
                                </p>
                            </div>
                        </div>

                        <div className="mt-auto pt-6 border-t border-slate-100">
                             <p className="text-[10px] text-slate-300 font-bold uppercase tracking-[0.2em] text-center">Version 4.1 Diagnostic</p>
                        </div>
                    </aside>

                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full animate-in fade-in duration-500">
                        <header className="mb-8">
                            <h2 className="text-3xl font-black text-slate-800 tracking-tight text-center md:text-left">事故診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium text-center md:text-left italic">具備動態權限偵測，自動修復 API 調用路徑。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-6 bg-red-50 border border-red-200 text-red-700 rounded-2xl shadow-sm">
                                <div className="flex items-center gap-3 mb-3">
                                    <Icon name="AlertCircle" className="text-red-600" />
                                    <div className="font-bold text-lg">偵測到 API 權限問題</div>
                                </div>
                                <div className="text-sm bg-white/60 p-3 rounded-xl border border-red-100 font-mono mb-4 break-all leading-relaxed">
                                    {error}
                                </div>
                                <div className="space-y-2">
                                    <p className="font-bold text-xs uppercase tracking-wider text-red-800 flex items-center gap-2">
                                        <Icon name="Lightbulb" className="text-amber-500" /> 解決建議清單：
                                    </p>
                                    <ul className="text-xs space-y-2 list-disc pl-5 opacity-90">
                                        <li><b>更換金鑰來源</b>：建議改用 <a href="https://aistudio.google.com/app/apikey" target="_blank" className="underline font-bold">Google AI Studio</a> 產生的金鑰，那邊的金鑰權限最完整。</li>
                                        <li><b>檢查 API 啟用狀態</b>：在 Google Cloud 中確認「Generative Language API」是否已啟用。</li>
                                        <li><b>取消 IP/網址限制</b>：檢查該金鑰是否設定了錯誤的「應用程式限制」。</li>
                                    </ul>
                                </div>
                                <button onClick={() => window.location.reload()} className="mt-4 w-full py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition-colors flex items-center justify-center gap-2">
                                    <Icon name="RefreshCw" /> 重試連線
                                </button>
                            </div>
                        )}

                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-8 transition-all focus-within:ring-2 focus-within:ring-indigo-100">
                            <div className="flex justify-between items-center mb-4 text-xs font-black text-slate-400 uppercase tracking-widest">
                                <span>事故詳細經過描述</span>
                                <button onClick={() => setFormData({description:'', analysis:null})} className="hover:text-indigo-600 font-bold px-2 py-1">清空</button>
                            </div>
                            <textarea 
                                placeholder="請輸入細節，例如：搬運化學桶時因地面濕滑，台車重心不穩撞擊管線..."
                                value={formData.description}
                                onChange={e => setFormData({...formData, description: e.target.value})}
                                disabled={loading}
                                className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-none transition-all text-slate-700 font-medium text-base leading-relaxed"
                            />
                            <button 
                                onClick={handleAnalyze}
                                disabled={loading || !formData.description.trim()}
                                className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg disabled:opacity-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"
                            >
                                {loading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Target" />}
                                {loading ? "正在自癒連線中..." : "開始 AI 分析診斷"}
                            </button>
                        </div>

                        {formData.analysis && (
                            <div className="animate-fade-in bg-white rounded-3xl p-8 shadow-xl border border-slate-200">
                                <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                    <div className="flex items-center gap-3 font-bold text-xl text-slate-800 tracking-tight">
                                        <div className="w-2 h-8 bg-indigo-600 rounded-full" /> 診斷報告摘要
                                    </div>
                                    <div className={`px-4 py-1.5 rounded-full text-xs font-black tracking-wide border ${
                                        formData.analysis.riskLevel === '高' ? 'bg-red-50 text-red-600 border-red-200' : 
                                        formData.analysis.riskLevel === '中' ? 'bg-amber-50 text-amber-600 border-amber-200' : 
                                        'bg-emerald-50 text-emerald-600 border-emerald-200'
                                    }`}>
                                        風險級別：{formData.analysis.riskLevel}
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-6 mb-10">
                                    <div className="p-5 bg-rose-50/50 rounded-2xl border border-rose-100 flex flex-col">
                                        <h4 className="text-rose-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="Zap" />直接原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow font-medium italic">
                                            {(formData.analysis.directCauses || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-rose-200">"{c}"</li>)}
                                        </ul>
                                    </div>

                                    <div className="p-5 bg-amber-50/50 rounded-2xl border border-amber-100 flex flex-col">
                                        <h4 className="text-amber-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="Cpu" />間接原因</h4>
                                        <div className="space-y-6 flex-grow">
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1 uppercase tracking-widest">
                                                    <Icon name="AlertTriangle" className="text-[10px]" /> 不安全的狀況
                                                </p>
                                                <ul className="space-y-2 text-slate-700 font-medium">
                                                    {(formData.analysis.unsafeConditions || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-amber-200">{c}</li>)}
                                                </ul>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1 uppercase tracking-widest">
                                                    <Icon name="UserX" className="text-[10px]" /> 不安全的行為
                                                </p>
                                                <ul className="space-y-2 text-slate-700 font-medium">
                                                    {(formData.analysis.unsafeActs || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-amber-200">{c}</li>)}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 flex flex-col">
                                        <h4 className="text-indigo-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="ShieldCheck" />基本原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow font-medium">
                                            {(formData.analysis.basicCauses || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-indigo-200">{c}</li>)}
                                        </ul>
                                    </div>
                                </div>

                                <section className="bg-emerald-50/50 p-6 rounded-2xl border border-emerald-100">
                                    <h4 className="text-emerald-800 font-black mb-6 flex items-center gap-2 uppercase tracking-widest"><Icon name="Lightbulb" />建議改善對策</h4>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {(formData.analysis.countermeasures || []).map((m,i)=>(
                                            <div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 text-slate-700 shadow-sm font-semibold flex gap-3 transition-all">
                                                <Icon name="CheckCircle2" /> <span>{m}</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
